# OpenMFA Plugin Messages (Spanish)

# Plugin Description
plugin.description=Este complemento proporciona soporte de Autenticación Multifactor (MFA) usando Contraseñas de un Solo Uso Basadas en Tiempo (TOTP) para usuarios de Jenkins autenticados mediante LDAP u otros reinos de seguridad.
plugin.features.title=Características
plugin.features.totp=MFA basado en TOTP (compatible con Google Authenticator, Authy, etc.)
plugin.features.peruser=Configuración de MFA por usuario
plugin.features.qrcode=Generación de código QR para una configuración fácil
plugin.features.wraps=Envuelve reinos de seguridad existentes (LDAP, Active Directory, etc.)
plugin.features.optional=Opcional: Requerir MFA para todos los usuarios
plugin.setup.title=Configuración
plugin.setup.step1=Ir a Administrar Jenkins \u2192 Configurar Seguridad Global
plugin.setup.step2=Seleccionar "MFA Security Realm (wraps existing realm)" como Reino de Seguridad
plugin.setup.step3=Configurar su reino subyacente (por ejemplo, LDAP)
plugin.setup.step4=Guardar la configuración
plugin.setup.step5=Los usuarios pueden configurar su MFA en su página de perfil

