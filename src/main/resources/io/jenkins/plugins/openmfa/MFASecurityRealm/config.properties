# MFA Security Realm Messages

# Config
config.delegate.title=Underlying Security Realm
config.requireMFA.title=Require MFA for All Users
config.requireMFA.description=If checked, all users must configure and use MFA to log in. If unchecked, MFA is optional and users can choose to enable it.
config.issuer.title=Issuer Name
config.issuer.default=Jenkins
config.issuer.description=The issuer name that will appear in authenticator apps (e.g., "Jenkins", "Company Jenkins").

# Help
help.main=Wraps an existing security realm (such as LDAP or Active Directory) and adds Time-based One-Time Password (TOTP) multi-factor authentication support.
help.delegate=Select the underlying security realm that will handle primary authentication (username/password). This is typically LDAP, Active Directory, or Jenkins'' own user database. MFA will be applied on top of this realm.
help.issuer=The issuer name that will be displayed in authenticator apps. This helps users identify which Jenkins instance the TOTP code is for. Example: "Company Jenkins" or "Production Jenkins"
help.requireMFA=When enabled, all users must configure and use MFA to access Jenkins. Users who haven''t set up MFA will be required to do so upon login. When disabled, MFA is optional and users can choose whether to enable it for their accounts.

