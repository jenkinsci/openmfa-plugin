# MFA Security Realm Messages (Spanish)

# Config
config.delegate.title=Dominio de Seguridad Subyacente
config.requireMFA.title=Requerir MFA para Todos los Usuarios
config.requireMFA.description=Si está marcado, todos los usuarios deben configurar y usar MFA para iniciar sesión. Si no está marcado, MFA es opcional y los usuarios pueden elegir habilitarlo.
config.issuer.title=Nombre del Emisor
config.issuer.default=Jenkins
config.issuer.description=El nombre del emisor que aparecerá en las aplicaciones de autenticación (por ejemplo, "Jenkins", "Jenkins de la Empresa").

# Help
help.main=Envuelve un dominio de seguridad existente (como LDAP o Active Directory) y agrega soporte de autenticación multifactor de contraseña de un solo uso basada en tiempo (TOTP).
help.delegate=Seleccione el dominio de seguridad subyacente que manejará la autenticación principal (nombre de usuario/contraseña). Esto suele ser LDAP, Active Directory o la base de datos de usuarios propia de Jenkins. MFA se aplicará sobre este dominio.
help.issuer=El nombre del emisor que se mostrará en las aplicaciones de autenticación. Esto ayuda a los usuarios a identificar para qué instancia de Jenkins es el código TOTP. Ejemplo: "Jenkins de la Empresa" o "Jenkins de Producción"
help.requireMFA=Cuando está habilitado, todos los usuarios deben configurar y usar MFA para acceder a Jenkins. Los usuarios que no hayan configurado MFA deberán hacerlo al iniciar sesión. Cuando está deshabilitado, MFA es opcional y los usuarios pueden elegir si habilitarlo para sus cuentas.


