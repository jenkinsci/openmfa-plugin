# OpenMFA Plugin Messages

# Plugin Description
plugin.description=This plugin provides Multi-Factor Authentication (MFA) support using Time-based One-Time Passwords (TOTP) for Jenkins users authenticated via LDAP or other security realms.
plugin.features.title=Features
plugin.features.totp=TOTP-based MFA (compatible with Google Authenticator, Authy, etc.)
plugin.features.peruser=Per-user MFA configuration
plugin.features.qrcode=QR code generation for easy setup
plugin.features.wraps=Wraps existing security realms (LDAP, Active Directory, etc.)
plugin.features.optional=Optional: Require MFA for all users
plugin.setup.title=Setup
plugin.setup.step1=Go to Manage Jenkins \u2192 Configure Global Security
plugin.setup.step2=Select "MFA Security Realm (wraps existing realm)" as the Security Realm
plugin.setup.step3=Configure your underlying realm (e.g., LDAP)
plugin.setup.step4=Save the configuration
plugin.setup.step5=Users can then configure their MFA in their profile page

